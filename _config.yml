about_content: | # this will include new lines to allow paragraphs
  Java & Spring 기반의 7년차 백엔드 개발자로,
  __퇴직연금 서비스__와 __임상 데이터 연구·분석(Clinical Data Warehouse)플랫폼__ 개발을 중심으로
  대용량 데이터 처리와 안정적인 서비스 운영 경험을 쌓아왔습니다.

  특히 데이터셋 관리, 분석 기능, 아트보드 구조 등 CDW 핵심 기능을 직접 설계·개발하며
  복잡한 비즈니스 로직을 구조적으로 풀어내고, 쿼리 성능 개선과 비동기 처리 등을 통해
  서비스의 처리 효율을 높이는 데 집중해왔습니다.

  <mark>효율적인 업무 진행과 팀의 성장</mark>을 중요하게 생각하며,
  중복되는 작업을 줄이고 구조를 개선하는 방향으로 개발을 진행하고있습니다.
  또한 협업 과정에서 코드와 설계를 팀과 공유하고 개선하는 문화를 통해
  지속적으로 더 나은 개발 환경을 만드는 데 기여하고 있습니다.

